<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Uma Surpresa 💖</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #ff9ecf, #ff5ea8);
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    overflow: hidden;
}

h1 {
    margin-top: 80px;
    font-size: 40px;
    animation: fadeIn 2s ease-in-out;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background-color: white;
    color: #ff5ea8;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 20px;
}

button:hover {
    transform: scale(1.1);
}

#mensagem {
    margin-top: 20px;
    font-size: 22px;
    display: none;
}

#gameArea {
    margin-top: 40px;
    height: 200px;
    position: relative;
}

.heart {
    position: absolute;
    font-size: 30px;
    cursor: pointer;
    animation: float 4s linear infinite;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes float {
    from {transform: translateY(200px);}
    to {transform: translateY(-200px);}
}
</style>
</head>

<body>

<h1>Você encontrou algo especial 💕</h1>

<button onclick="mostrarMensagem()">Clique aqui 💌</button>

<div id="mensagem">
    Você é a melhor parte dos meus dias 💖✨
</div>

<h2>Pegue 5 corações para desbloquear a surpresa! 🎮</h2>

<div id="gameArea"></div>

<script>
function mostrarMensagem() {
    document.getElementById("mensagem").style.display = "block";
}

let pontos = 0;

function criarCoracao() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 90 + "%";

    heart.onclick = function() {
        pontos++;
        heart.remove();

        if (pontos === 5) {
            alert("💍 Surpresa desbloqueada! Você ganhou um beijo virtual 😘");
        }
    };

    document.getElementById("gameArea").appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 4000);
}

setInterval(criarCoracao, 1000);
</script>

</body>
</html>
