<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Capture Meu Amor 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align: center;
    color: white;
}

h1 {
    margin-top: 30px;
    font-size: 32px;
    padding: 0 15px;
}

#score {
    font-size: 18px;
    margin-top: 10px;
}

.heart {
    position: absolute;
    font-size: 50px;
    cursor: pointer;
    animation: fall linear forwards;
    user-select: none;
}

@keyframes fall {
    from { transform: translateY(-10vh); }
    to { transform: translateY(110vh); }
}

#loveBarContainer {
    width: 80%;
    height: 20px;
    background: rgba(255,255,255,0.3);
    margin: 20px auto;
    border-radius: 20px;
}

#loveBar {
    height: 100%;
    width: 0%;
    background: red;
    border-radius: 20px;
    transition: 0.3s;
}

#surprise {
    display: none;
    font-size: 22px;
    margin: 20px;
    animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>

<body>

<h1>Capture os Corações 💕</h1>
<div id="score">Amor coletado: 0</div>

<div id="loveBarContainer">
    <div id="loveBar"></div>
</div>

<div id="surprise">
    💖 Surpresa desbloqueada! 💖 <br><br>
    Você ganhou meu amor infinito! 🤍
</div>

<script>
let score = 0;

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 90 + "vw";
    heart.style.animationDuration = (Math.random() * 2 + 3) + "s";

    function collectHeart() {
        score++;
        document.getElementById("score").innerText = "Amor coletado: " + score;

        let percentage = score * 5;
        if (percentage > 100) percentage = 100;
        document.getElementById("loveBar").style.width = percentage + "%";

        if (percentage >= 100) {
            document.getElementById("surprise").style.display = "block";
        }

        heart.remove();
    }

    heart.addEventListener("click", collectHeart);
    heart.addEventListener("touchstart", collectHeart);

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 900);
</script>

</body>
</html>
