<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Amor 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
}

/* ===== TELA DO JOGO ===== */
#gameScreen {
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    height: 100vh;
}

h1 {
    padding-top: 30px;
    font-size: 28px;
}

#score {
    font-size: 18px;
    margin-top: 10px;
}

.heart {
    position: absolute;
    font-size: 50px;
    cursor: pointer;
    animation: fall linear forwards;
    user-select: none;
}

@keyframes fall {
    from { transform: translateY(-10vh); }
    to { transform: translateY(110vh); }
}

/* ===== TELA FINAL ===== */
#finalScreen {
    display: none;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    height: 100vh;
    padding: 40px 20px;
}

#finalScreen h2 {
    font-size: 30px;
    margin-top: 40px;
}

#finalScreen p {
    font-size: 20px;
    margin-top: 20px;
}

.fadeIn {
    animation: fade 2s ease-in-out forwards;
}

@keyframes fade {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>

<body>

<!-- ===== JOGO ===== -->
<div id="gameScreen">
    <h1>Capture 20 Corações 💕</h1>
    <div id="score">Amor coletado: 0 / 20</div>
</div>

<!-- ===== TELA FINAL ===== -->
<div id="finalScreen">
    <h2 class="fadeIn">💖 Surpresa Desbloqueada 💖</h2>
    <p class="fadeIn">
        Você coletou todos os meus corações... <br><br>
        Mas a verdade é que todos eles já eram seus. <br><br>
        Eu te amo infinitamente 💕
    </p>
</div>

<script>
let score = 0;

function createHeart() {
    if (score >= 20) return;

    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 90 + "vw";
    heart.style.animationDuration = (Math.random() * 2 + 3) + "s";

    function collectHeart() {
        score++;
        document.getElementById("score").innerText = 
            "Amor coletado: " + score + " / 20";

        if (score >= 20) {
            document.getElementById("gameScreen").style.display = "none";
            document.getElementById("finalScreen").style.display = "block";
        }

        heart.remove();
    }

    heart.addEventListener("click", collectHeart);
    heart.addEventListener("touchstart", collectHeart);

    document.getElementById("gameScreen").appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 900);
</script>

</body>
</html>
